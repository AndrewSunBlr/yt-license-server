services:
  - type: web
    name: yt-license-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yt-licenses-db
          property: connectionString
      - key: SERVER_PRIVATE_KEY
        generateValue: true
